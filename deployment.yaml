apiVersion: apps/v1
kind: Deployment
metadata:
  name: p3-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: p3-app
  template:
    metadata:
      labels:
        app: p3-app
    spec:
      containers:
        - name: p3-app-container
          image: paulbouwer/hello-kubernetes:1.5
          ports:
            - containerPort: 8080
          env:
            - name: MESSAGE
              value: "P3 APP."

